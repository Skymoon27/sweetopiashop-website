<html lang="ms"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweetopia Lens - Maklum Balas Kanta Sentuh</title>
    <!-- Menggunakan Tailwind CSS untuk susun atur yang responsif -->
    <script src="https://skymoon27.github.io/sweetopiashop-website/index.html"></script>
    <!-- Menggunakan Google Font 'Fredoka' untuk reka bentuk bubbly & comel -->
    <link href="https://skymoon27.github.io/sweetopiashop-website/index.html" rel="stylesheet">
    
    <style>
        /* Gaya Am & Latar Belakang */
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #FFF0F5;
            background-image: 
                radial-gradient(#FFD21E 15%, transparent 16%),
                radial-gradient(#FF2A85 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Blob Hiasan Latar Belakang yang Besar & Berani */
        .blob-pink {
            position: absolute;
            background-color: #FF2A85;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.25;
            z-index: 0;
        }
        .blob-teal {
            position: absolute;
            background-color: #00C2B2;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.25;
            z-index: 0;
        }

        /* Gaya Kad Maklum Balas dengan Sempadan Beralun (Scalloped Border) */
        .scalloped-card {
            background-color: #FFF0F6;
            border: 6px solid #00C2B2;
            border-radius: 40px;
            box-shadow: 0 20px 0px rgba(0, 0, 0, 0.08), inset 0 0 20px rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 10;
        }

        /* Kesan Sempadan Beralun Menggunakan SVG Mask atau pseudo-elements */
        .scalloped-card::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border: 6px dashed #FF2A85;
            border-radius: 46px;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Animasi Belon Terapung & Elemen Hiasan */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-element {
            animation: float 4s ease-in-out infinite;
        }
        .floating-element-delayed {
            animation: float 5s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        /* Gaya Input yang Comel & Bubbly */
        .cute-input {
            border: 3px solid #00C2B2;
            border-radius: 30px;
            transition: all 0.3s ease;
            background-color: #FFFFFF;
            padding-left: 3.5rem;
        }
        .cute-input:focus {
            outline: none;
            border-color: #FF2A85;
            box-shadow: 0 0 12px rgba(255, 42, 133, 0.3);
            transform: scale(1.01);
        }

        /* Butang Hantar dengan Kesan Tiga Dimensi yang Tebal */
        .cute-btn {
            background-color: #FF6F6F;
            border: 4px solid #1A1A1A;
            box-shadow: 0 8px 0px #1A1A1A;
            transform: translateY(0px);
            transition: all 0.15s ease;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .cute-btn:hover {
            background-color: #FF8585;
            transform: translateY(2px);
            box-shadow: 0 6px 0px #1A1A1A;
        }
        .cute-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0px #1A1A1A;
        }

        /* Pilihan Warna Kanta */
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 0 0 2px #1A1A1A;
            transition: transform 0.2s;
        }
        .color-dot:hover {
            transform: scale(1.2);
        }
        .color-dot.active {
            transform: scale(1.3);
            border-color: #FFD21E;
        }

        /* Gaya Modal Kejayaan */
        .modal-overlay {
            background-color: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(5px);
        }
    </style>

                Maklum balas berharga anda telah berjaya dihantar. Teruskan menyinar setiap hari! ✨
            </p>
            <button onclick="closeModal()" class="cute-btn px-8 py-2.5 rounded-full text-white font-semibold">
                Sama-sama!
            </button>
        </div>
    </div>

    <!-- Sistem Animasi Partikel Hati Belon -->
    <div id="particle-container" class="absolute inset-0 pointer-events-none z-30 overflow-hidden"></div>

    <!-- Script Logik Interaktif & Animasi -->
    <script>
        // Fungsi Penukaran Warna Kanta Mata Watak Chibi
        function changeLensColor(color, element) {
            // Tukar warna di SVG
            document.getElementById('iris-left').setAttribute('fill', color);
            document.getElementById('iris-right').setAttribute('fill', color);
            
            // Kemas kini status dot aktif
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');

            // Cetus letupan kecil partikel warna sepadan di sekeliling muka watak
            createColorSparks(color);
        }

        // Kesan Letupan Warna Apabila Memilih Kanta
        function createColorSparks(color) {
            const container = document.getElementById('particle-container');
            const rect = document.querySelector('.w-44').getBoundingClientRect();
            const bodyRect = document.body.getBoundingClientRect();
            
            const centerX = rect.left - bodyRect.left + rect.width / 2;
            const centerY = rect.top - bodyRect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.style.position = 'absolute';
                p.style.width = '10px';
                p.style.height = '10px';
                p.style.borderRadius = '50%';
                p.style.backgroundColor = color;
                p.style.left = centerX + 'px';
                p.style.top = centerY + 'px';
                p.style.transition = 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                
                container.appendChild(p);

                // Gerakkan partikel secara rawak ke luar
                const angle = (i * 45) * (Math.PI / 180);
                const distance = 40 + Math.random() * 30;
                const targetX = centerX + Math.cos(angle) * distance;
                const targetY = centerY + Math.sin(angle) * distance;

                setTimeout(() => {
                    p.style.transform = `translate(${targetX - centerX}px, ${targetY - centerY}px)`;
                    p.style.opacity = '0';
                }, 10);

                setTimeout(() => p.remove(), 600);
            }
        }

        // Pengendalian Penghantaran Borang
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Ambil maklumat
            const nama = document.getElementById('nama').value;
            const emel = document.getElementById('emel').value;
            const jenisKanta = document.getElementById('jenis_kanta').value;
            const komen = document.getElementById('komen').value;

            console.log("Menghantar Maklum Balas:", { nama, emel, jenisKanta, komen });

            // Letupkan konfeti hati gembira
            launchHeartConfetti();

            // Papar Modal Kejayaan
            const modal = document.getElementById('successModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.add('opacity-100');
                modal.firstElementChild.classList.remove('scale-90');
                modal.firstElementChild.classList.add('scale-100');
            }, 50);
        });

        // Tutup Modal & Set Semula Borang
        function closeModal() {
            const modal = document.getElementById('successModal');
            modal.classList.remove('opacity-100');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-90');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('feedbackForm').reset();
            }, 300);
        }

        // Kesan Letupan Konfeti Hati (Hantar Borang)
        function launchHeartConfetti() {
            const container = document.getElementById('particle-container');
            const colors = ['#FF2A85', '#00C2B2', '#FFD21E', '#FF6F6F', '#FF8EA9'];
            const hearts = ['💖', '💕', '✨', '🌸', '👀'];

            for (let i = 0; i < 40; i++) {
                const heart = document.createElement('div');
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = Math.random() * 20 + 20 + 'px';
                heart.style.zIndex = '999';
                heart.style.transition = `all ${Math.random() * 2 + 1.5}s ease-out`;
                
                container.appendChild(heart);

                // Mulakan simulasi naik ke atas secara terapung
                setTimeout(() => {
                    heart.style.transform = `translateY(-120vh) translateX(${(Math.random() - 0.5) * 300}px) rotate(${Math.random() * 360}deg)`;
                    heart.style.opacity = '0';
                }, 50);

                // Buang elemen selepas tamat animasi
                setTimeout(() => heart.remove(), 3500);
            }
        }
    </script>

</body></html>
